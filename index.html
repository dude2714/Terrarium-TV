<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Moovies</title>
  <style>
    :root {
      --bg: #0a0c10;
      --panel: rgba(18, 22, 30, 0.9);
      --text: #f4f7fb;
      --muted: #a1adbb;
      --accent: #7bd389;
      --border: rgba(255, 255, 255, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Segoe UI, Tahoma, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(123, 211, 137, 0.16), transparent 32%),
        radial-gradient(circle at bottom right, rgba(78, 132, 255, 0.12), transparent 30%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(920px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(12px);
    }
    .hero {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 18px;
      align-items: center;
      padding: 14px;
    }
    .art {
      width: 140px;
      height: 140px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #111;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
    }
    .art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    h1 { margin: 0 0 8px 0; font-size: clamp(2rem, 3vw, 3rem); letter-spacing: 0.02em; }
    p { margin: 6px 0; color: var(--muted); }
    .btn {
      margin-top: 18px;
      display: inline-block;
      background: var(--accent);
      color: #08120b;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 10px;
      font-weight: 700;
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }
    .meta {
      margin-top: 18px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.5;
      word-break: break-word;
    }
    code { color: #c9d1d9; }
  </style>
</head>
<body>
  <main class="card">
    <section class="hero">
      <div class="art">
        <img src="icon.png" alt="Moovies icon" />
      </div>
      <div>
        <h1>Moovies</h1>
        <p>Standalone APK download page.</p>
        <a class="btn" id="downloadBtn" href="Moovies-v3.6.23.apk" download>Download Moovies APK</a>
      </div>
    </section>
    <img src="fanart.jpg" alt="Moovies fanart" style="width:100%;max-height:280px;object-fit:cover;border-radius:16px;border:1px solid var(--border);display:block;margin-top:10px;" />
    <section class="meta" id="meta">Loading release metadata...</section>
  </main>

  <script>
    async function loadRelease() {
      const meta = document.getElementById('meta');
      const downloadBtn = document.getElementById('downloadBtn');
      try {
        const res = await fetch('release.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('release.json not found');
        const r = await res.json();
        if (r.apkFile) {
          const encodedFile = encodeURIComponent(r.apkFile).replace(/%2F/g, '/');
          downloadBtn.href = `${encodedFile}?t=${Date.now()}`;
          downloadBtn.setAttribute('download', r.apkFile);
        }
        meta.innerHTML = [
          `<div><strong>Version:</strong> ${r.version ?? '-'}</div>`,
          `<div><strong>Updated (UTC):</strong> ${r.updatedUtc ?? '-'}</div>`,
          `<div><strong>File:</strong> ${r.apkFile ?? '-'}</div>`,
          `<div><strong>Size:</strong> ${r.sizeBytes ?? '-'} bytes</div>`,
          `<div><strong>SHA-256:</strong> <code>${r.sha256 ?? '-'}</code></div>`,
          `<div><strong>Notes:</strong> ${r.notes ?? '-'}</div>`
        ].join('');
      } catch (err) {
        meta.textContent = 'release.json unavailable. APK download is still available above.';
      }
    }
    loadRelease();
  </script>
</body>
</html>

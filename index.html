<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Terrarium TV</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #2ea043;
      --border: #30363d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Segoe UI, Tahoma, sans-serif;
      background: radial-gradient(circle at 20% 20%, #1f2a37 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(720px, 100%);
      background: color-mix(in srgb, var(--panel) 92%, black);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.45);
    }
    h1 { margin: 0 0 8px 0; font-size: 2rem; }
    p { margin: 6px 0; color: var(--muted); }
    .btn {
      margin-top: 18px;
      display: inline-block;
      background: var(--accent);
      color: white;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 10px;
      font-weight: 700;
    }
    .meta {
      margin-top: 18px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.5;
      word-break: break-word;
    }
    code { color: #c9d1d9; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Terrarium TV</h1>
    <p>Standalone APK download page.</p>
    <a class="btn" href="Terrarium%20TV.apk" download>Download Terrarium TV APK</a>
    <section class="meta" id="meta">Loading release metadata...</section>
  </main>

  <script>
    async function loadRelease() {
      const meta = document.getElementById('meta');
      try {
        const res = await fetch('release.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('release.json not found');
        const r = await res.json();
        meta.innerHTML = [
          `<div><strong>Version:</strong> ${r.version ?? '-'}</div>`,
          `<div><strong>Updated (UTC):</strong> ${r.updatedUtc ?? '-'}</div>`,
          `<div><strong>File:</strong> ${r.apkFile ?? '-'}</div>`,
          `<div><strong>Size:</strong> ${r.sizeBytes ?? '-'} bytes</div>`,
          `<div><strong>SHA-256:</strong> <code>${r.sha256 ?? '-'}</code></div>`,
          `<div><strong>Notes:</strong> ${r.notes ?? '-'}</div>`
        ].join('');
      } catch (err) {
        meta.textContent = 'release.json unavailable. APK download is still available above.';
      }
    }
    loadRelease();
  </script>
</body>
</html>
